name: Update Race Data

on:
  schedule:
    - cron: "2,17,32,47 * * * *" # every 15 min, guarded incremental refresh (offset off the hour to dodge load)
    - cron: "0 7 * * 1" # Monday 07:00 UTC, unconditional --full reconciliation
  workflow_dispatch:
    inputs:
      mode:
        description: "auto = guarded incremental; full = unconditional --full reconciliation"
        type: choice
        options:
          - auto
          - full
        default: auto
      force:
        description: "When mode=auto, run even if the guard says no update is due"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write # open/refresh a failure-alert issue when an update run fails

# Never run two data updates at once, and don't cancel one mid-commit.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  # Cheap, no-network gate. Most runs stop here in ~15s.
  check:
    runs-on: ubuntu-latest
    outputs:
      due: ${{ steps.decide.outputs.due }}
      mode: ${{ steps.decide.outputs.mode }}
    steps:
      # Pin to main: data PRs merge into main, so main's podigami.json asOf is
      # the only one that advances. A scheduled run checks out the default
      # branch (develop), whose stale asOf would re-report the same race as
      # due after every merge, looping the update forever.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Decide whether an update is due
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          # Weekly cron OR an explicit full dispatch => unconditional --full.
          if [ "$CRON" = "0 7 * * 1" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_MODE" = "full" ]; }; then
            {
              echo "mode=full"
              echo "due=true"
            } >> "$GITHUB_OUTPUT"
            echo "Unconditional full reconciliation -> due=true mode=full"
            exit 0
          fi
          echo "mode=normal" >> "$GITHUB_OUTPUT"
          # A forced normal dispatch bypasses the guard.
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_FORCE" = "true" ]; then
            echo "due=true" >> "$GITHUB_OUTPUT"
            echo "Forced normal run -> due=true mode=normal"
            exit 0
          fi
          # Scheduled cron (or an unforced auto dispatch): consult the cheap local
          # guard, which appends due=true|false to $GITHUB_OUTPUT (no network).
          python src/check_update_due.py

  # Full refresh: only runs when the guard (or an unconditional trigger) says so.
  update:
    needs: check
    if: needs.check.outputs.due == 'true'
    runs-on: ubuntu-latest
    # Covers the watcher's 2h poll budget plus the pipeline, well under the 6h cap.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Pin to main: the data branch must be cut from main (the PR base),
          # not the default branch (develop) — otherwise unpromoted develop
          # commits ride along into main inside the data PR.
          ref: main
          # PAT (not the built-in token) so the branch push + PR trigger CI, and
          # the eventual squash-merge is attributed to a real user so deploy fires.
          token: ${{ secrets.DATA_PUSH_TOKEN }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      # GitHub honours only a fraction of our 15-min cron (~1 run/hour observed,
      # with multi-hour overnight gaps), so a fetch that lands before the API has
      # published the race costs a WHOLE HOUR before the next attempt — that is
      # what put the 2026 Belgian GP on the site ~100min late. Hold the runner
      # and poll until the round appears instead, so cron only has to land one
      # slot in a wide window. Scheduled runs only: a human dispatch should act
      # now, not block for up to 2h, and `full` is a reconciliation, not a race.
      - name: Wait for the finished race to be published upstream
        if: needs.check.outputs.mode != 'full' && github.event_name == 'schedule'
        run: python src/wait_for_results.py

      - name: Fetch latest data and rebuild site
        run: |
          if [ "${{ needs.check.outputs.mode }}" = "full" ]; then
            python src/update.py --full
          else
            python src/update.py
          fi
      # Open/refresh the PR BEFORE validating: a bad-data run then surfaces as a
      # visible red PR (whose required checks gate the auto-merge) instead of a
      # silently-skipped step. The validate + tests below still run, so a bad run
      # also goes red and trips the failure alert (notify-failure job).
      - name: Open or refresh the data PR and arm auto-merge
        env:
          GH_TOKEN: ${{ secrets.DATA_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes; nothing to do."
            exit 0
          fi
          BRANCH="auto/update-data"
          DATE="$(date -u +%Y-%m-%dT%H:%MZ)"
          # Dedicated bot-only branch, serialized by the workflow concurrency group,
          # so a plain force-push is safe.
          git checkout -B "$BRANCH"
          git commit -m "Update race data $DATE"
          git push --force origin "$BRANCH"
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "Update race data $DATE" \
              --body "Automated race-data refresh. Auto-merges once all required checks pass."
          fi
          gh pr merge --auto --squash --delete-branch "$BRANCH"
      - name: Validate datasets
        run: PYTHONPATH=src python -m datalib.validate
      - name: Run tests
        run: pytest -q

  # If the guard or the update itself fails, the site silently stalls one race
  # behind (no PR merges; the guard just re-fires every tick). Make that loud:
  # open — or refresh — a single deduplicated issue so a failure pings a human
  # within one cron tick instead of hiding in a red run nobody watches.
  notify-failure:
    needs: [check, update]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open or refresh the failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create auto-update-failure --repo "$GITHUB_REPOSITORY" \
            --color B60205 --description "update.yml data refresh is failing" 2>/dev/null || true
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label auto-update-failure --json number --jq '.[0].number // empty')"
          body=$'The automated data update failed, so the site will stall one race behind until it is fixed (the guard keeps firing but no data PR merges).\n\nFailed run: '"$RUN_URL"$'\n\nDiagnose per CLAUDE.md (Deployment > "When a finished race does not appear"). Typical tell: check green with update red (Run tests failed), or an open auto/update-data PR whose checks are red. Close this issue once a data PR merges.'
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Still failing as of $(date -u +%Y-%m-%dT%H:%MZ): $RUN_URL"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "⚠️ Automated data update is failing" \
              --label auto-update-failure --body "$body"
          fi
