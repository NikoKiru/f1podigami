name: CI

on:
  push:
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check --output-format=github .
      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Run tests with coverage gate
        run: pytest --cov --cov-report=term-missing
      - name: Publish coverage to job summary
        if: ${{ matrix.python-version == '3.12' }}
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build & link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Build site
        run: python src/build_site.py
      - name: Check links in the built site
        uses: lycheeverse/lychee-action@v2
        with:
          # Offline mode verifies local/relative links resolve to real files
          # without hitting the network (so external links can't flake CI).
          args: "--offline --no-progress 'dist/**/*.html'"
          fail: true
      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 7
