name: Dependabot auto-merge

# Enables GitHub's native auto-merge on Dependabot PRs. The PR still has to pass
# CI (.github/workflows/ci.yml) before it actually merges — auto-merge just means
# "merge it for me once all required checks are green".
#
# By default only patch + minor bumps auto-merge; major bumps are left for manual
# review. To auto-merge everything, delete the `if:` condition on the merge step.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge (patch & minor only)
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
